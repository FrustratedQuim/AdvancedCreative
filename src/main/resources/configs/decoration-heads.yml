decoration-heads:
  api:
    base-url: "https://minecraft-heads.com"
    app-uuid: "APP_UUID"
    api-key: ""
    demo: false
    connect-timeout-ms: 5000
    read-timeout-ms: 7000
  warm-pages: 1
  head-cache-size: 4096
  search-query-cache-size: 128
  player-recent-limit: 45
