      display: "Еда"
      mode: CATEGORY_GROUP
      apiNames: ["Food & Drinks"]
    plants:
      display: "Растения"
      mode: CATEGORY_GROUP
      apiNames: ["Plants"]
    characters:
      display: "Персонажи"
      mode: CATEGORY_GROUP
      apiNames: ["Humans", "Humanoid"]
    decoration:
      display: "Декорации"
      mode: CATEGORY_GROUP
      apiNames: ["Decoration"]
    animals:
      display: "Животные"
      mode: CATEGORY_GROUP
      apiNames: ["Animals"]
    monsters:
      display: "Монстры"
      mode: CATEGORY_GROUP
      apiNames: ["Monsters"]
    symbols:
      display: "Символы"
      mode: CATEGORY_GROUP
      apiNames: ["Alphabet"]
    helmets:
      display: "Шлемы"
      mode: CATEGORY_GROUP
      apiNames: ["Helmets"]
    blocks:
      display: "Блоки"
      mode: CATEGORY_GROUP
