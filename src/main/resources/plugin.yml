name: ${name}
version: ${version}
main: com.ratger.acreative.AdvancedCreative
api-version: '1.21'
authors: [ ratger ]
description: Adds some silly features
website: https://minetoday.org
depend: [ packetevents ]

commands:
  ahelp:
    description: Show helpful commands
    usage: /ahelp
  sit:
    description: Sit down
    usage: /sit
  sithead:
    description: Sit player on another player
    usage: /sithead <target> [player]
  lay:
    description: Lay down
    usage: /lay
  crawl:
    description: Crawl
    usage: /crawl
  hide:
    description: Hide a pepich from player view
    usage: /hide <player>
  sneeze:
    description: Literally sneeze
    usage: /sneeze
  glide:
    description: Toggle gliding without elytra
    usage: /glide
  gravity:
    description: Sets custom gravity
    usage: /gravity <value>
  resize:
    description: Sets custom size
    usage: /resize <value>
  strength:
    description: Sets custom strength
    usage: /strength <value>
  health:
    description: Sets custom max health
    usage: /health <value>
  freeze:
    description: Freezes the player
    usage: /freeze
  glow:
    description: Toggles glowing effect
    usage: /glow
  spit:
    description: Literally spit
    usage: /spit
  piss:
    description: Literally piss
    usage: /piss
  disguise:
    description: Turns the player into a mob
    usage: /disguise <type>
    aliases: [dd]
  effects:
    description: Applies an effect to player
    usage: /effects <effect> [level]
  jar:
    description: Gives a jar item for placing a jailed player
    usage: /jar <player> [-const]
  grab:
    description: Grabs a player in front of you
    usage: /grab <player>
  slap:
    description: Toggles slap mode
    usage: /slap
  itemdb:
    description: Shows the item String/Numeric ID
    usage: /itemdb
    aliases: [id]
  banner:
    description: Opens banner manager and moderation actions
    usage: /banner [post|ban|banlist|banuser|banuserlist]
  decorationbanners:
    description: Opens player banner gallery
    usage: /decorationbanners [player] [-m]
    aliases: [db, banners]
  decorationheads:
    description: Opens decoration heads menu
    usage: /decorationheads
    aliases: [dh]
  banneredit:
    description: Opens banner editor
    usage: /banneredit
    aliases: [bedit]
  edit:
    description: Open item editor menu
    usage: /edit
  apply:
    description: Apply pending editor input
    usage: /apply <value|cancel>
  acreative:
    description: Admin management command
    usage: /acreative <memory>

permissions:
  advancedcreative.ahelp:
    description: Allows using /ahelp
    default: true
  advancedcreative.itemdb:
    description: Allows using /itemdb
    default: op
  advancedcreative.banner:
    description: Allows using /banner
    default: true
  advancedcreative.banner.moderation:
    description: Allows using /banner ban, banlist, banuser and banuserlist
    default: op
  advancedcreative.decorationbanners:
    description: Allows using /decorationbanners
    default: true
  advancedcreative.decorationbanners.moderation:
    description: Allows moderation mode in /decorationbanners
    default: op
  advancedcreative.banneredit:
    description: Allows using /banneredit
    default: true
  advancedcreative.sit:
    description: Allows using /sit
    default: op
  advancedcreative.sithead:
    description: Allows to sit on head of other player & using /sithead
    default: op
  advancedcreative.sithead.other:
    description: Allows to sit player on another player
    default: op
  advancedcreative.lay:
    description: Allows using /lay
    default: op
  advancedcreative.crawl:
    description: Allows using /crawl
    default: op
  advancedcreative.hide:
    description: Allows using /hide
    default: op
  advancedcreative.hide.bypass:
    description: Prevents hiding the player
    default: op
  advancedcreative.sneeze:
    description: Allows using /sneeze
    default: op
  advancedcreative.glide:
    description: Allows using /glide
    default: op
  advancedcreative.gravity:
    description: Allows using /gravity
    default: op
  advancedcreative.resize:
    description: Allows using /resize
    default: op
  advancedcreative.strength:
    description: Allows using /strength
    default: op
  advancedcreative.health:
    description: Allows using /health
    default: op
  advancedcreative.freeze:
    description: Allows using /freeze
    default: op
  advancedcreative.freeze.other:
    description: Allows using /freeze <player>
    default: op
  advancedcreative.glow:
    description: Allows using /glow
    default: op
  advancedcreative.spit:
    description: Allows using /spit
    default: op
  advancedcreative.piss:
    description: Allows using /piss
    default: op
  advancedcreative.disguise:
    description: Allows using /disguise
    default: op
  advancedcreative.disguise.full:
    description: Allows using /disguise & all types
    default: op
  advancedcreative.disguise.nick:
    description: Allows using /disguise with nickname visibility flags
    default: op
  advancedcreative.effects:
    description: Allows using /effects
    default: op
  advancedcreative.effects.other:
    description: Allows using /effects & target
    default: op
  advancedcreative.jar:
    description: Allows using /jar
    default: op
  advancedcreative.grab:
    description: Allows using /grab
    default: op
  advancedcreative.slap:
    description: Allows using /slap
    default: op
  advancedcreative.slap.bypass:
    description: Prevents slapping the player
    default: op

  advancedcreative.edit:
    description: Allows using /edit
    default: op
  advancedcreative.apply:
    description: Allows using /apply
    default: op
  advancedcreative.decorationheads:
    description: Allows using /decorationheads
    default: op
  advancedcreative.acreative:
    description: Allows using /acreative
    default: op
